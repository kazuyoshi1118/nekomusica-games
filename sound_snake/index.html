<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sound Snake — 音蛇 | NEKOMUSICA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060f;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none}
canvas{border-radius:12px;box-shadow:0 0 50px rgba(138,92,246,0.3)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const MAX_W=400,MAX_H=700;
let scale=1;
function resize(){scale=Math.min(window.innerWidth/MAX_W,window.innerHeight/MAX_H,1);canvas.width=MAX_W*scale;canvas.height=MAX_H*scale;ctx.setTransform(scale,0,0,scale,0,0)}
resize();window.addEventListener('resize',resize);

let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
const SCALE=[261.6,293.7,329.6,392,440,523.3,587.3,659.3,784,880];
function playNote(i){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=SCALE[i%SCALE.length];g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.25)}

const CELL=20,COLS=Math.floor(MAX_W/CELL),ROWS=Math.floor(MAX_H/CELL);
const STATE={TITLE:0,PLAY:1,OVER:2};
let state=STATE.TITLE,frame=0,score=0,highScore=parseInt(localStorage.getItem('soundSnakeHigh')||'0');
let snake=[],dir={x:1,y:0},nextDir={x:1,y:0},food=null,particles=[];
let moveTimer=0,moveInterval=8;
let touchStart=null;

const FOOD_TYPES=[
  {symbol:'♪',color:'#8a5cf6'},
  {symbol:'♫',color:'#f472b6'},
  {symbol:'♩',color:'#22d3ee'},
  {symbol:'★',color:'#fbbf24'},
];

function startGame(){initAudio();state=STATE.PLAY;score=0;frame=0;moveTimer=0;moveInterval=8;
  snake=[{x:Math.floor(COLS/2),y:Math.floor(ROWS/2)}];
  for(let i=1;i<4;i++)snake.push({x:snake[0].x-i,y:snake[0].y});
  dir={x:1,y:0};nextDir={x:1,y:0};particles=[];spawnFood()}

function spawnFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*(ROWS-4))+2}}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food={...pos,type:FOOD_TYPES[Math.floor(Math.random()*FOOD_TYPES.length)]}
}

function addP(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2;particles.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:c,size:2+Math.random()*2})}}

// Touch controls - swipe
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!==STATE.PLAY){if(state===STATE.TITLE)startGame();else state=STATE.TITLE;return}const r=canvas.getBoundingClientRect();touchStart={x:(e.touches[0].clientX-r.left)/scale,y:(e.touches[0].clientY-r.top)/scale}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(!touchStart||state!==STATE.PLAY)return;const r=canvas.getBoundingClientRect();const end={x:(e.changedTouches[0].clientX-r.left)/scale,y:(e.changedTouches[0].clientY-r.top)/scale};
  const dx=end.x-touchStart.x,dy=end.y-touchStart.y;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==- 1)nextDir={x:1,y:0};else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0}}
  else{if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1}}
  touchStart=null},{passive:false});
canvas.addEventListener('click',()=>{if(state===STATE.TITLE)startGame();else if(state===STATE.OVER)state=STATE.TITLE});
// Keyboard
document.addEventListener('keydown',e=>{
  if(state===STATE.TITLE){startGame();return}if(state===STATE.OVER){state=STATE.TITLE;return}
  if(e.key==='ArrowUp'&&dir.y!==1)nextDir={x:0,y:-1};
  else if(e.key==='ArrowDown'&&dir.y!==-1)nextDir={x:0,y:1};
  else if(e.key==='ArrowLeft'&&dir.x!==1)nextDir={x:-1,y:0};
  else if(e.key==='ArrowRight'&&dir.x!==-1)nextDir={x:1,y:0};
});

function update(){
  frame++;
  if(state!==STATE.PLAY)return;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.025;if(p.life<=0)particles.splice(i,1)}
  moveTimer++;
  if(moveTimer<moveInterval)return;
  moveTimer=0;
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // Wrap
  if(head.x<0)head.x=COLS-1;if(head.x>=COLS)head.x=0;
  if(head.y<0)head.y=ROWS-1;if(head.y>=ROWS)head.y=0;
  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    if(score>highScore){highScore=score;localStorage.setItem('soundSnakeHigh',String(highScore))}
    state=STATE.OVER;return;
  }
  snake.unshift(head);
  if(food&&head.x===food.x&&head.y===food.y){
    score+=10;addP(food.x,food.y,food.type.color,10);playNote(score/10);
    spawnFood();moveInterval=Math.max(4,8-Math.floor(score/50));
  }else{snake.pop()}
}

function drawBg(){const g=ctx.createLinearGradient(0,0,0,MAX_H);g.addColorStop(0,'#08060f');g.addColorStop(1,'#12102a');ctx.fillStyle=g;ctx.fillRect(0,0,MAX_W,MAX_H);
  for(let i=0;i<30;i++){ctx.fillStyle=`rgba(255,255,255,${0.15+Math.sin(frame*0.01+i)*0.1})`;ctx.beginPath();ctx.arc((i*137.5)%MAX_W,(i*97.3)%MAX_H,0.7,0,Math.PI*2);ctx.fill()}}

function drawSnake(){
  snake.forEach((s,i)=>{
    const alpha=1-i*0.02;
    const hue=270+i*3;
    ctx.fillStyle=i===0?'#a78bfa':`hsla(${hue},70%,65%,${Math.max(0.3,alpha)})`;
    ctx.shadowColor='#8a5cf6';ctx.shadowBlur=i===0?12:5;
    ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);ctx.fill();
    ctx.shadowBlur=0;
    if(i===0){ctx.fillStyle='#fff';ctx.beginPath();
      const ex=s.x*CELL+CELL/2+dir.x*3,ey=s.y*CELL+CELL/2+dir.y*3;
      ctx.arc(ex-dir.y*3,ey+dir.x*3,2,0,Math.PI*2);ctx.fill();
      ctx.arc(ex+dir.y*3,ey-dir.x*3,2,0,Math.PI*2);ctx.fill()}
  });
}

function drawFood(){
  if(!food)return;
  const x=food.x*CELL+CELL/2,y=food.y*CELL+CELL/2;
  ctx.shadowColor=food.type.color;ctx.shadowBlur=10;
  ctx.fillStyle=food.type.color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='16px sans-serif';
  ctx.fillText(food.type.symbol,x,y);ctx.shadowBlur=0;
}

function drawParticles(){for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawHUD(){ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.fillText(`Score: ${score}`,15,30);ctx.textAlign='right';ctx.fillStyle='#9790a8';ctx.font='12px sans-serif';ctx.fillText(`Length: ${snake.length}`,MAX_W-15,30)}

function drawTitle(){drawBg();ctx.textAlign='center';
  ctx.shadowColor='#8a5cf6';ctx.shadowBlur=30;ctx.fillStyle='#fff';ctx.font='bold 40px sans-serif';ctx.fillText('Sound Snake',MAX_W/2,240);ctx.shadowBlur=0;
  ctx.fillStyle='#a78bfa';ctx.font='18px sans-serif';ctx.fillText('— 音蛇 —',MAX_W/2,275);
  ctx.fillStyle='#9790a8';ctx.font='14px sans-serif';ctx.fillText('スワイプで蛇を操作しよう',MAX_W/2,320);ctx.fillText('音符を食べると音が鳴る♪',MAX_W/2,342);
  const a=0.4+Math.sin(frame*0.05)*0.4;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.font='16px sans-serif';ctx.fillText('Tap to Start',MAX_W/2,520);
  if(highScore>0){ctx.fillStyle='#fbbf24';ctx.font='14px sans-serif';ctx.fillText(`High Score: ${highScore}`,MAX_W/2,560)}
  ctx.fillStyle='#4a4560';ctx.font='11px sans-serif';ctx.fillText('NEKOMUSICA',MAX_W/2,MAX_H-30)}

function drawOver(){drawBg();ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,MAX_W,MAX_H);
  ctx.shadowColor='#ff6b9d';ctx.shadowBlur=20;ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.fillText('Game Over',MAX_W/2,240);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.fillText(`${score}`,MAX_W/2,300);
  ctx.fillStyle='#9790a8';ctx.font='14px sans-serif';ctx.fillText(`Length: ${snake.length}`,MAX_W/2,335);
  if(score>=highScore&&score>0){ctx.fillStyle='#fbbf24';ctx.font='bold 16px sans-serif';ctx.fillText('New High Score!',MAX_W/2,375)}
  const a=0.4+Math.sin(frame*0.05)*0.4;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.font='16px sans-serif';ctx.fillText('Tap to Continue',MAX_W/2,460);
  ctx.fillStyle='#4a4560';ctx.font='11px sans-serif';ctx.fillText('NEKOMUSICA',MAX_W/2,MAX_H-30)}

function loop(){update();
  if(state===STATE.TITLE)drawTitle();
  else if(state===STATE.PLAY){drawBg();drawSnake();drawFood();drawParticles();drawHUD()}
  else drawOver();
  requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
