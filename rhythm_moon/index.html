<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moon Rhythm — 月のリズム | NEKOMUSICA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060f;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none}
canvas{border-radius:12px;box-shadow:0 0 50px rgba(138,92,246,0.3)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const MAX_W=400,MAX_H=700;
let scale=1;
function resize(){const w=window.innerWidth,h=window.innerHeight;scale=Math.min(w/MAX_W,h/MAX_H,1);canvas.width=MAX_W*scale;canvas.height=MAX_H*scale;ctx.setTransform(scale,0,0,scale,0,0)}
resize();window.addEventListener('resize',resize);

let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
const NOTES=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3];
function playNote(i,dur=0.15){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=NOTES[i%NOTES.length];g.gain.setValueAtTime(0.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}

const LANES=4,LANE_W=MAX_W/LANES,HIT_Y=MAX_H-120;
const LANE_COLORS=['#8a5cf6','#f472b6','#22d3ee','#fbbf24'];
const STATE={TITLE:0,PLAYING:1,OVER:2};
let state=STATE.TITLE,frame=0,score=0,combo=0,maxCombo=0,highScore=parseInt(localStorage.getItem('moonRhythmHigh')||'0');
let notes=[],particles=[],judgements=[],spawnTimer=0,speed=3,bpm=0;

function spawnNote(){const lane=Math.floor(Math.random()*LANES);notes.push({lane,y:-30,speed:speed+Math.random()*0.5,hit:false})}
function addParticles(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:2+Math.random()*3})}}
function showJudgement(text,color){judgements.push({text,color,y:HIT_Y-40,life:1})}

function startGame(){initAudio();state=STATE.PLAYING;score=0;combo=0;maxCombo=0;notes=[];particles=[];judgements=[];frame=0;speed=3;bpm=0}

function hitLane(lane){
  let best=null,bestDist=999;
  for(const n of notes){
    if(n.lane!==lane||n.hit)continue;
    const dist=Math.abs(n.y-HIT_Y);
    if(dist<bestDist){bestDist=dist;best=n}
  }
  if(!best)return;
  const dist=Math.abs(best.y-HIT_Y);
  if(dist<20){best.hit=true;score+=100*(1+Math.floor(combo/10));combo++;maxCombo=Math.max(maxCombo,combo);showJudgement('Perfect!','#fbbf24');addParticles(best.lane*LANE_W+LANE_W/2,HIT_Y,LANE_COLORS[best.lane],12);playNote(combo)}
  else if(dist<45){best.hit=true;score+=50*(1+Math.floor(combo/10));combo++;maxCombo=Math.max(maxCombo,combo);showJudgement('Good','#22d3ee');addParticles(best.lane*LANE_W+LANE_W/2,HIT_Y,LANE_COLORS[best.lane],6);playNote(combo)}
  else if(dist<70){best.hit=true;score+=10;combo=0;showJudgement('Miss','#ff6b6b')}
}

function getPos(e){const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)/scale,y:(t.clientY-r.top)/scale}}

canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state===STATE.TITLE){startGame();return}if(state===STATE.OVER){state=STATE.TITLE;return}for(let i=0;i<e.touches.length;i++){const p=getPos({touches:[e.touches[i]]});hitLane(Math.floor(p.x/LANE_W))}},{passive:false});
canvas.addEventListener('click',e=>{if(state===STATE.TITLE){startGame();return}if(state===STATE.OVER){state=STATE.TITLE;return}const p=getPos(e);hitLane(Math.floor(p.x/LANE_W))});

function update(){
  frame++;
  if(state!==STATE.PLAYING)return;
  speed=3+frame*0.0005;
  spawnTimer++;
  const interval=Math.max(15,40-Math.floor(frame/200));
  if(spawnTimer>=interval){spawnTimer=0;spawnNote();if(Math.random()<0.3)spawnNote()}
  for(let i=notes.length-1;i>=0;i--){
    notes[i].y+=notes[i].speed;
    if(notes[i].y>MAX_H+30){if(!notes[i].hit){combo=0;showJudgement('Miss','#ff6b6b')}notes.splice(i,1)}
    else if(notes[i].hit&&notes[i].y>HIT_Y+50)notes.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;if(p.life<=0)particles.splice(i,1)}
  for(let i=judgements.length-1;i>=0;i--){judgements[i].y-=1;judgements[i].life-=0.02;if(judgements[i].life<=0)judgements.splice(i,1)}
  if(frame>200&&notes.length===0&&spawnTimer>interval*3){if(score>highScore){highScore=score;localStorage.setItem('moonRhythmHigh',String(highScore))}state=STATE.OVER}
}

function drawBg(){const g=ctx.createLinearGradient(0,0,0,MAX_H);g.addColorStop(0,'#08060f');g.addColorStop(1,'#1a1535');ctx.fillStyle=g;ctx.fillRect(0,0,MAX_W,MAX_H);
  for(let i=0;i<40;i++){ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(frame*0.01+i)*0.2})`;ctx.beginPath();ctx.arc((i*137.5)%MAX_W,(i*97.3)%MAX_H,0.8,0,Math.PI*2);ctx.fill()}
}

function drawLanes(){
  for(let i=1;i<LANES;i++){ctx.strokeStyle='rgba(138,92,246,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i*LANE_W,0);ctx.lineTo(i*LANE_W,MAX_H);ctx.stroke()}
  ctx.strokeStyle='rgba(138,92,246,0.5)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,HIT_Y);ctx.lineTo(MAX_W,HIT_Y);ctx.stroke();
  for(let i=0;i<LANES;i++){ctx.fillStyle='rgba(138,92,246,0.08)';ctx.fillRect(i*LANE_W,HIT_Y-15,LANE_W,30)}
}

function drawNotes(){
  for(const n of notes){
    if(n.hit)continue;
    const x=n.lane*LANE_W+LANE_W/2;
    ctx.shadowColor=LANE_COLORS[n.lane];ctx.shadowBlur=15;
    ctx.fillStyle=LANE_COLORS[n.lane];ctx.beginPath();ctx.arc(x,n.y,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(x,n.y,8,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='16px sans-serif';ctx.fillStyle='#fff';ctx.fillText(['♪','♫','♩','★'][n.lane],x,n.y);
  }
}

function drawParticles(){for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawJudgements(){ctx.textAlign='center';for(const j of judgements){ctx.globalAlpha=j.life;ctx.fillStyle=j.color;ctx.font='bold 20px sans-serif';ctx.fillText(j.text,MAX_W/2,j.y)}ctx.globalAlpha=1}

function drawHUD(){
  ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.fillText(`Score: ${score}`,15,35);
  ctx.textAlign='right';ctx.fillStyle='#fbbf24';ctx.font='bold 16px sans-serif';
  if(combo>=3)ctx.fillText(`${combo} Combo`,MAX_W-15,35);
}

function drawTitle(){
  drawBg();ctx.textAlign='center';
  ctx.shadowColor='#8a5cf6';ctx.shadowBlur=30;ctx.fillStyle='#fff';ctx.font='bold 40px sans-serif';ctx.fillText('Moon Rhythm',MAX_W/2,240);ctx.shadowBlur=0;
  ctx.fillStyle='#a78bfa';ctx.font='18px sans-serif';ctx.fillText('— 月のリズム —',MAX_W/2,275);
  ctx.fillStyle='#9790a8';ctx.font='14px sans-serif';ctx.fillText('リズムに合わせてタップしよう',MAX_W/2,320);
  for(let i=0;i<LANES;i++){ctx.fillStyle=LANE_COLORS[i];ctx.globalAlpha=0.5+Math.sin(frame*0.05+i)*0.3;ctx.font='28px sans-serif';ctx.fillText(['♪','♫','♩','★'][i],120+i*55,400)}
  ctx.globalAlpha=1;
  const a=0.4+Math.sin(frame*0.05)*0.4;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.font='16px sans-serif';ctx.fillText('Tap to Start',MAX_W/2,520);
  if(highScore>0){ctx.fillStyle='#fbbf24';ctx.font='14px sans-serif';ctx.fillText(`High Score: ${highScore}`,MAX_W/2,560)}
  ctx.fillStyle='#4a4560';ctx.font='11px sans-serif';ctx.fillText('NEKOMUSICA',MAX_W/2,MAX_H-30);
}

function drawOver(){
  drawBg();ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,MAX_W,MAX_H);
  ctx.shadowColor='#f472b6';ctx.shadowBlur=20;ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.fillText('Song Complete',MAX_W/2,220);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.fillText(`${score}`,MAX_W/2,290);ctx.fillStyle='#9790a8';ctx.font='14px sans-serif';ctx.fillText('Score',MAX_W/2,315);
  ctx.fillStyle='#a78bfa';ctx.font='16px sans-serif';ctx.fillText(`Max Combo: ${maxCombo}`,MAX_W/2,360);
  if(score>=highScore&&score>0){ctx.fillStyle='#fbbf24';ctx.font='bold 16px sans-serif';ctx.fillText('New High Score!',MAX_W/2,400)}
  const a=0.4+Math.sin(frame*0.05)*0.4;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.font='16px sans-serif';ctx.fillText('Tap to Continue',MAX_W/2,500);
  ctx.fillStyle='#4a4560';ctx.font='11px sans-serif';ctx.fillText('NEKOMUSICA',MAX_W/2,MAX_H-30);
}

function loop(){
  update();
  if(state===STATE.TITLE)drawTitle();
  else if(state===STATE.PLAYING){drawBg();drawLanes();drawNotes();drawParticles();drawJudgements();drawHUD()}
  else drawOver();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
